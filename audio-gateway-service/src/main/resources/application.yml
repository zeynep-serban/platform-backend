# audio-gateway-service — Faz 24 Meeting Intelligence
# 3-AI mutabakat Codex 019e879c + Mavis msg 78 AGREE.

spring:
  application:
    name: audio-gateway-service
  threads:
    virtual:
      enabled: true
  cloud:
    discovery:
      enabled: false
    gateway:
      discovery:
        locator:
          enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Overlay env var: AUDIO_GATEWAY_JWT_ISSUER_URI
          issuer-uri: ${AUDIO_GATEWAY_JWT_ISSUER_URI:http://localhost:8080/realms/dev-local}

server:
  port: 8210
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

# Audio Gateway contract limits (Codex 019e879c bounds + 019e8846 iter-1 + 019e8c26 iter-2 ADR-0031 absorb)
audio:
  gateway:
    contract:
      version: "1.0"
    bounds:
      # ADR-0031 + Codex 019e8c26 iter-2: chunk 256 KB (1 MB pre-PoC overshoot stale),
      # session 60 dk (120 dk pre-PoC stale). Configurable env override.
      max-chunk-bytes: 262144        # 256 KB per chunk
      max-buffered-seconds: 30
      max-session-minutes: 60        # 60 dk max session
      admission-queue-capacity: 1000
      # Bounded in-memory session registry (PR-gw-01A persistence iddiası YOK;
      # durability sonraki slice PR-gw-01C Redis Streams ile gelir).
      max-active-sessions: 1000
    # Codex `019e8df2` iter-2 AGREE PR-gw-01B3 — dispatcher canonical port (old stt.dispatch-mode retired)
    dispatcher:
      mode: noop                     # noop | redis (PR-gw-01C cross-server Streams producer)
      queue-full-retry-after-seconds: 5
      unavailable-retry-after-seconds: 30
    jwt:
      # 3-AI mutabakat Codex 019e8846 iter-1: tenant/user claim adı configurable;
      # backend canonical pattern (common-auth/AuthenticatedUserLookupService) "companyId" + "userId".
      # Absent claim → fail-closed 403 (sessiz "unknown" YASAK).
      tenant-claim: companyId
      user-claim: userId
    idempotency:
      # Codex 019e8c26 iter-2 AGREE: Idempotency-Key header canonical;
      # 16-128 char (UUIDv4 tavsiye, zorunlu değil); scope tenantId+userId+method+route+key.
      header-name: Idempotency-Key
      min-length: 16
      max-length: 128
      # Bounded LRU cache for idempotency-key replay window (memory-only PR-gw-01A).
      replay-cache-size: 4096

logging:
  level:
    com.example.audiogateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
