# k8s overlay — testai.acik.com + ai.acik.com Keycloak realm
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUDIO_GATEWAY_JWT_ISSUER_URI:http://platform-keycloak:8080/realms/platform}

audio:
  gateway:
    stt:
      dispatch-mode: ${AUDIO_GATEWAY_STT_DISPATCH:noop}
    bounds:
      max-chunk-bytes: ${AUDIO_GATEWAY_MAX_CHUNK_BYTES:1048576}
      max-buffered-seconds: ${AUDIO_GATEWAY_MAX_BUFFERED_SECONDS:30}
      max-session-minutes: ${AUDIO_GATEWAY_MAX_SESSION_MINUTES:120}
      admission-queue-capacity: ${AUDIO_GATEWAY_QUEUE_CAPACITY:1000}
    jwt:
      tenant-claim: ${AUDIO_GATEWAY_JWT_TENANT_CLAIM:companyId}
      user-claim: ${AUDIO_GATEWAY_JWT_USER_CLAIM:userId}
