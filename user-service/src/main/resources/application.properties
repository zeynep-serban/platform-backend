# src/main/resources/application.properties

# Varsayılan olarak 'local' profilini aktif et.
spring.profiles.active=local

# Virtual Threads (Loom) — Java 21
spring.threads.virtual.enabled=true

# --- ORTAK AYARLAR ---
server.port=8089
spring.application.name=user-service

# Vault ayarları prod/test profillerinde application-prod.yml & application-test.yml

# Permission Service Ayarları
permission.service.base-url=${PERMISSION_SERVICE_BASE_URL:http://permission-service}
permission.audit-mirror.base-url=${PERMISSION_AUDIT_MIRROR_BASE_URL:${PERMISSION_SERVICE_BASE_URL:http://permission-service}}
permission.audit-mirror.enabled=${PERMISSION_AUDIT_MIRROR_ENABLED:true}
permission.audit-mirror.internal-api-key=${PERMISSION_SERVICE_INTERNAL_API_KEY:}

security.service-token.audience=${SERVICE_TOKEN_AUDIENCE:permission-service}
security.service-token.ttl-seconds=${SERVICE_TOKEN_TTL_SECONDS:60}
security.service-token.permissions=${SERVICE_TOKEN_PERMISSIONS:permissions:read}
security.service-token.environment=${SERVICE_TOKEN_ENV:local}

# Mint by auth-service (client_credentials)
security.service-token.client.token-url=${SERVICE_TOKEN_MINT_URL:http://localhost:8088/oauth2/token}
security.service-token.client.client-id=${SERVICE_TOKEN_CLIENT_ID:user-service}
security.service-token.client.client-secret=${SERVICE_TOKEN_CLIENT_SECRET:}

security.service-auth.expected-audience=${SERVICE_AUTH_EXPECTED_AUDIENCE:user-service,frontend,account,serban-web}
security.service-auth.allowed-client-ids=${SECURITY_AUTH_ALLOWED_CLIENT_IDS:frontend,admin-cli,serban-web,account}
security.service-auth.expected-environment=${SERVICE_AUTH_EXPECTED_ENV:}
# Keycloak master realm defaults (prod/test) – env ile override edilebilir
security.service-auth.jwk-set-uri=${SERVICE_AUTH_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
security.service-auth.issuer=${SERVICE_AUTH_ISSUER:http://localhost:8081/realms/serban}

# Veri tabanı ayarları — Vault (prod) ya da env (k8s)
spring.datasource.url=${SPRING_DATASOURCE_URL:${vault.db.user-service.url:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${vault.db.user-service.user:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${vault.db.user-service.password:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Ayarları
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=${USER_DB_SCHEMA:public}

# Security debug logs (dev only)
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.com.example.user=DEBUG
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=${USER_FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.table=user_flyway_history
spring.flyway.default-schema=${USER_DB_SCHEMA:public}
spring.flyway.schemas=${USER_DB_SCHEMA:public}

# Actuator & Health Check Ayarları
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

# Eureka Client Ayarları (sağlık kontrolü gibi ortak olanlar)
eureka.client.healthcheck.enabled=true
eureka.instance.health-check-url-path=/actuator/health
eureka.instance.prefer-ip-address=true

# Logging Ayarları
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO

# Export guard defaults (CSV rate limit)
export.rate-limit.per-minute=${EXPORT_RATE_LIMIT_PER_MINUTE:12}
export.rate-limit.burst=${EXPORT_RATE_LIMIT_BURST:24}

# Keycloak user lazy-provision bridge (M365 first-login auto-provision).
# When a valid Keycloak JWT arrives with no backend `users` row, the
# KeycloakUserAutoProvisionFilter creates a least-privilege USER profile
# instead of returning 403 PROFILE_MISSING. The gate is config-driven:
# only allow-listed issuers (and, unless allow-local-keycloak=true, tokens
# carrying the M365 `entra_tid` marker claim) are auto-provisioned.
auto-provision.enabled=${AUTO_PROVISION_ENABLED:true}
auto-provision.allowed-issuers=${AUTO_PROVISION_ALLOWED_ISSUERS:platform-test,serban}
auto-provision.allow-local-keycloak=${AUTO_PROVISION_ALLOW_LOCAL_KEYCLOAK:false}
