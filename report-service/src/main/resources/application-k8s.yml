# application-k8s.yml — report-service (platform-k8s-gitops uyumlu)
# D7 Eureka kaldırıldı, D18 management port 8081, D19 host Service+Endpoints
# NOT: Primary datasource MSSQL (reporting views), metadata PostgreSQL

spring:
  application:
    name: report-service
  threads:
    virtual:
      enabled: true

# ADR-0005 Dual DataSource Reporting
# - Primary MSSQL (Workcube ERP, read-only live) — yukarıdaki spring.datasource ile bind
# - Secondary PostgreSQL (platform metadata: custom_reports, alerts, schedules) — aşağıda
# - WorkcubeMssqlConfig (PR #6) feature-flagged "ek" secondary qualifier opsiyonu olarak kalır
report:
  # PR-D2.1d (ADR-0015, Codex 019e83bd iter-2 PARTIAL absorb):
  # remote-http executor allowlist seed for k8s profile. Cluster env
  # has user-service routable via DNS at http://user-service:8089 (NOT
  # 8082 — port verified against platform-k8s-gitops Service+Deployment).
  # application.yml default keeps enabled: false (dev/test guard); the
  # k8s profile flips it on when at least one allowlist entry exists.
  remote-executor:
    enabled: ${REPORT_REMOTE_EXECUTOR_ENABLED:true}
    timeout: ${REPORT_REMOTE_EXECUTOR_TIMEOUT:5s}
    allowlist:
      - service: user-service
        path: /api/v1/users
        base-url: ${REPORT_REMOTE_EXECUTOR_USER_SERVICE_BASE_URL:http://user-service:8089}
        request-shape: style-api-paged-v1
      # PR-D2.2 (ADR-0015): access-report remote-http endpoint.
      # permission-service Service exposes port 8090 (D-003 contract,
      # targetPort 8084 container). AccessControllerV1.listRoles returns
      # PagedResultDto<RoleDto> {items, total, page, pageSize} —
      # paged-items-total response shape uyumlu.
      - service: permission-service
        path: /api/v1/roles
        base-url: ${REPORT_REMOTE_EXECUTOR_PERMISSION_SERVICE_BASE_URL:http://permission-service:8090}
        request-shape: style-api-paged-v1
      # PR-D2.3 (ADR-0015): audit-report remote-http endpoint.
      # AuditEventController returns AuditEventPageResponse{events, page, total}
      # → paged-events-total response shape (PR-D2.1c5 widening).
      # Request: audit-events-v1 (filter[xxx]= + dateFrom/dateTo/action/level/
      # service/correlationId/search direct passthrough).
      - service: permission-service
        path: /api/audit/events
        base-url: ${REPORT_REMOTE_EXECUTOR_PERMISSION_SERVICE_BASE_URL:http://permission-service:8090}
        request-shape: audit-events-v1
  postgres:
    url: ${REPORT_PG_URL:jdbc:postgresql://platform-pg.platform-system:5432/users}
    username: ${REPORT_PG_USERNAME:postgres}
    password: ${REPORT_PG_PASSWORD:postgres}
  mssql:
    # Faz 19.MSSQL.A WorkcubeMssqlConfig feature flag (default false → secondary qualifier disabled)
    enabled: ${REPORT_MSSQL_ENABLED:false}
    jdbc-url: ${REPORT_MSSQL_JDBC_URL:}
    username: ${REPORT_MSSQL_USERNAME:}
    password: ${REPORT_MSSQL_PASSWORD:}
    pool:
      max-size: ${REPORT_MSSQL_POOL_MAX:5}
      connection-timeout-ms: ${REPORT_MSSQL_POOL_CONN_TIMEOUT_MS:10000}
      max-lifetime-ms: ${REPORT_MSSQL_POOL_MAX_LIFETIME_MS:300000}
  cloud:
    vault:
      enabled: false
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
  datasource:
    # Primary MSSQL (Workcube ERP read-only live, ADR-0005)
    # ESO ExternalSecret report-service-mssql-secrets → REPORT_MSSQL_* env vars
    # Read-only enforce: applicationIntent=ReadOnly (URL) + transactionManager.setEnforceReadOnly(true)
    url: ${REPORT_MSSQL_JDBC_URL:}
    username: ${REPORT_MSSQL_USERNAME:}
    password: ${REPORT_MSSQL_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/serban}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/serban/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8095}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      # ADR-0005: Workcube MSSQL custom indicator readiness'a DAHİL DEĞİL
      # MSSQL down olduğunda pod evict/restart döngüsü olmaması için.
      group:
        readiness:
          include: db,ping
          exclude: workcubeMssql
        liveness:
          include: ping
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSSXXX}","level":"%p","trace_id":"%X{traceId:-}","span_id":"%X{spanId:-}","thread":"%t","logger":"%logger{36}","message":"%m"}%n'
