spring:
  threads:
    virtual:
      enabled: true
  application:
    name: report-service
  datasource:
    url: jdbc:sqlserver://${REPORT_MSSQL_HOST:localhost}:${REPORT_MSSQL_PORT:1433};databaseName=${REPORT_MSSQL_DB:reporting};encrypt=true;trustServerCertificate=true;applicationIntent=ReadOnly
    username: ${REPORT_MSSQL_USERNAME:sa}
    password: ${REPORT_MSSQL_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      max-lifetime: 600000
      read-only: true
      auto-commit: true
      pool-name: report-mssql-pool
      connection-init-sql: SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;
  jpa:
    open-in-view: false
  flyway:
    enabled: true

report:
  postgres:
    url: jdbc:postgresql://${REPORT_PG_HOST:localhost}:${REPORT_PG_PORT:5432}/${REPORT_PG_DB:users}
    username: ${REPORT_PG_USERNAME:postgres}
    password: ${REPORT_PG_PASSWORD:postgres}
  definitions-path: classpath:reports/
  query:
    timeout-seconds: 30
    max-export-rows: 500000
  audit:
    internal-api-key: ${PERMISSION_SERVICE_INTERNAL_API_KEY:}
  # PR-D2.1c1 (ADR-0015) — remote-http executor adapter config.
  # Feature gate default disabled until PR-D2.1d (users-overview pilot)
  # adds the first ReportDefinition with execution.kind=remote-http.
  # AllowlistEntry path guard rejects // / .. / ? / # for security.
  remote-executor:
    enabled: ${REPORT_REMOTE_EXECUTOR_ENABLED:false}
    timeout: ${REPORT_REMOTE_EXECUTOR_TIMEOUT:5s}
    # allowlist seeded in per-env overlay (application-k8s.yml + dev profiles)
    allowlist: []

server:
  port: ${SERVER_PORT:8095}
  tomcat:
    threads:
      virtual:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:127.0.0.1}
    instance-id: ${spring.application.name}:${eureka.instance.hostname}:${server.port}

security:
  jwt:
    jwk-set-uri: ${SECURITY_JWT_JWK_SET_URI:http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
    issuer: ${SECURITY_JWT_ISSUER:http://localhost:8081/realms/serban}
    audience: ${SECURITY_JWT_AUDIENCE:report-service}

context-health:
  data-dir: ${CONTEXT_HEALTH_DATA_DIR:}
  index-dir: ${CONTEXT_HEALTH_INDEX_DIR:}
  cache-ttl-seconds: ${CONTEXT_HEALTH_CACHE_TTL:30}
  enabled: ${CONTEXT_HEALTH_ENABLED:false}

# --- Zanzibar / OpenFGA wiring (PR6c-1, CNS-20260416-003) ---
# Env names MUST use the ERP_OPENFGA_* prefix — that is the contract shared
# with compose/.env, user-service and variant-service. A bare OPENFGA_*
# variant would not be picked up in staging/prod.
erp:
  openfga:
    enabled: ${ERP_OPENFGA_ENABLED:true}
    api-url: ${ERP_OPENFGA_API_URL:http://openfga:8080}
    store-id: ${ERP_OPENFGA_STORE_ID:}
    model-id: ${ERP_OPENFGA_MODEL_ID:}
    check-cache-ttl-seconds: ${ERP_OPENFGA_CHECK_CACHE_TTL_SECONDS:10}

# AuthenticatedUserLookupService — user table (PostgreSQL, same DB as user-service).
authz:
  user-table: ${AUTHZ_USER_TABLE:user_service.users}

# Permission-service hub — default follows the repo-wide contract
# (DNS name `permission-service`); env override pins a specific host:port in
# compose/k8s. report-service only uses this for the
# RemoteAuthzVersionProvider poll; all authz decisions go through the local
# OpenFgaAuthzService (C-008 compliance).
permission:
  service:
    base-url: ${PERMISSION_SERVICE_BASE_URL:http://permission-service}

scope:
  cache:
    enabled: ${SCOPE_CACHE_ENABLED:true}
    ttl-seconds: ${SCOPE_CACHE_TTL_SECONDS:30}
    ttl-jitter-seconds: ${SCOPE_CACHE_TTL_JITTER_SECONDS:3}
    max-size: ${SCOPE_CACHE_MAX_SIZE:5000}

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
    com.example.report: DEBUG
