# Test profile — Testcontainers Postgres injection via @DynamicPropertySource
# in test base classes. ddl-auto=validate ensures Flyway-managed schema
# is consistent with JPA entity mapping (Faz 23.1 Foundation kabul kriteri).
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notify
  flyway:
    enabled: true
    default-schema: notify
    schemas: notify

# Codex 019dfaaa PR5 P1 #3 absorb: PR2/PR3/PR4 integration tests authz/preference
# guard çağırmasın (fail-closed DENY her şeyi BLOCKED yapardı). PR5 guard testleri
# @TestPropertySource ile explicit aç.
notify:
  preferences:
    enabled: false
  authz:
    enabled: false

logging:
  level:
    root: WARN
    com.serban.notify: DEBUG
    org.hibernate.SQL: DEBUG
