spring:
  application:
    name: notification-orchestrator
  # Mail config — Faz 23.1 PR3 (Codex 019df9ef P1 absorb).
  # Production: corporate SMTP relay or app-side DKIM (Faz 23.2). Test/dev:
  # Mailpit Testcontainers or local docker-compose Mailpit (port 1025).
  # spring-boot-starter-mail JavaMailSender bean auto-configured when host set.
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000
    # Production TLS-only (Codex Q4 mandate); Mailpit/test plaintext exception.
    # test-connection: false — context startup'ta probe ETME (boot sirasinda
    # SMTP yok ise context fail OLMASIN; PR3 dispatch lazy connect).
    test-connection: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notify_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: 2
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        default_schema: ${NOTIFY_DB_SCHEMA:notify}
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    default-schema: ${NOTIFY_DB_SCHEMA:notify}
    schemas: ${NOTIFY_DB_SCHEMA:notify}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8089}
  shutdown: graceful

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

notify:
  # PR2 dispatch.enabled=false default — worker yok, intake-only mode (Codex 019df9ae Q3)
  dispatch:
    enabled: ${NOTIFY_DISPATCH_ENABLED:false}
  # PR2 bounded intake — max-pending threshold (admin --reset-queue YASAK)
  intake:
    max-pending: ${NOTIFY_INTAKE_MAX_PENDING:10000}
  retry:
    max-attempts: ${NOTIFY_RETRY_MAX_ATTEMPTS:5}
    backoff-initial-ms: ${NOTIFY_RETRY_BACKOFF_INITIAL_MS:30000}
    backoff-multiplier: ${NOTIFY_RETRY_BACKOFF_MULTIPLIER:2.5}
  audit:
    retention-days: ${NOTIFY_AUDIT_RETENTION_DAYS:90}
  idempotency:
    window-hours: ${NOTIFY_IDEMPOTENCY_WINDOW_HOURS:24}
  dedupe:
    window-minutes: ${NOTIFY_DEDUPE_WINDOW_MINUTES:5}
  # PR2 PII redaction HMAC pepper — Faz 23.2 production: Vault/ESO injection
  redaction:
    pepper: ${NOTIFY_REDACTION_PEPPER:dev-only-pepper-not-for-production}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.serban.notify: ${LOGGING_LEVEL_COM_SERBAN_NOTIFY:INFO}
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%X{correlation_id:-NONE}] %-40.40logger{39} : %m%n"
