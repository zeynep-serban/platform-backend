spring:
  application:
    name: notification-orchestrator
  # Mail config — Faz 23.1 PR3 (Codex 019df9ef P1 absorb).
  # Production: corporate SMTP relay or app-side DKIM (Faz 23.2). Test/dev:
  # Mailpit Testcontainers or local docker-compose Mailpit (port 1025).
  # spring-boot-starter-mail JavaMailSender bean auto-configured when host set.
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000
    # Production TLS-only (Codex Q4 mandate); Mailpit/test plaintext exception.
    # test-connection: false — context startup'ta probe ETME (boot sirasinda
    # SMTP yok ise context fail OLMASIN; PR3 dispatch lazy connect).
    test-connection: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notify_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: 2
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        default_schema: ${NOTIFY_DB_SCHEMA:notify}
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    default-schema: ${NOTIFY_DB_SCHEMA:notify}
    schemas: ${NOTIFY_DB_SCHEMA:notify}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8089}
  shutdown: graceful

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  # Faz 23.2 PR-B: Micrometer Tracing (Codex 019dfae5 Q5 PARTIAL absorb)
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}  # PR-C activates
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:}  # PR-C: tempo/otel-collector URL

notify:
  # PR2 dispatch.enabled=false default — worker yok, intake-only mode (Codex 019df9ae Q3)
  # PR4: dispatch.enabled=true → OutboxPoller + RetryWorker + DLQ aktive (Codex 019dfa47 absorb)
  dispatch:
    enabled: ${NOTIFY_DISPATCH_ENABLED:false}
  # PR2 bounded intake — max-pending threshold (admin --reset-queue YASAK)
  intake:
    max-pending: ${NOTIFY_INTAKE_MAX_PENDING:10000}
  retry:
    max-attempts: ${NOTIFY_RETRY_MAX_ATTEMPTS:5}
    backoff-initial-ms: ${NOTIFY_RETRY_BACKOFF_INITIAL_MS:30000}
    backoff-multiplier: ${NOTIFY_RETRY_BACKOFF_MULTIPLIER:2.5}
    # PR4 absorb: max backoff cap (prevent excessive tail in misconfig)
    max-backoff-ms: ${NOTIFY_RETRY_MAX_BACKOFF_MS:3600000}
    # PR4 absorb: ±25% jitter — thundering herd avoidance
    jitter-ratio: ${NOTIFY_RETRY_JITTER_RATIO:0.25}
  # Faz 23.2 PR-A production security foundation (Codex 019dfae5 absorb).
  # Production profile (prod / production) ProductionConfigValidator fail-closed
  # gates aşağıdaki guard'ları zorunlu kılar.
  dkim:
    # Q1 PARTIAL: app-side DKIM default (production); test/dev: false
    enabled: ${NOTIFY_DKIM_ENABLED:false}
    selector: ${NOTIFY_DKIM_SELECTOR:default}
    domain: ${NOTIFY_DKIM_DOMAIN:testai.acik.com}
    private-key-pem: ${NOTIFY_DKIM_PRIVATE_KEY_PEM:}
  smtp:
    tls:
      # Q2 AGREE: production STARTTLS required; test profile false (Mailpit plaintext)
      enforce: ${NOTIFY_SMTP_TLS_ENFORCE:false}
      min-protocol: ${NOTIFY_SMTP_TLS_MIN_PROTOCOL:TLSv1.2}
      check-server-identity: ${NOTIFY_SMTP_TLS_CHECK_SERVER_IDENTITY:true}
  provider:
    # Q4 REVISE: dynamic config + cache + failover
    cache-ttl-seconds: ${NOTIFY_PROVIDER_CACHE_TTL_SECONDS:30}
  adapters:
    webhook:
      # Q3 PARTIAL: kid-aware HMAC registry (active + next; rotation)
      hmac-registry:
        enabled: ${NOTIFY_WEBHOOK_HMAC_REGISTRY_ENABLED:false}

  # PR5 preference + authz feature flags (Codex 019dfaaa absorb)
  # Production default: both enabled. Test profile: false (override per test class).
  preferences:
    enabled: ${NOTIFY_PREFERENCES_ENABLED:true}
  authz:
    enabled: ${NOTIFY_AUTHZ_ENABLED:true}
    permission-service:
      url: ${NOTIFY_AUTHZ_PERMISSION_SERVICE_URL:http://permission-service:8080}
    # Internal API key — production: Vault/ESO injection
    internal-api-key: ${NOTIFY_AUTHZ_INTERNAL_API_KEY:dev-only-key-not-for-production}
  # PR4 worker config (Codex 019dfa47 Q2 PARTIAL absorb — config-driven cadence)
  worker:
    poll-delay-ms: ${NOTIFY_WORKER_POLL_DELAY_MS:5000}
    intent-batch-size: ${NOTIFY_WORKER_INTENT_BATCH_SIZE:25}
    retry-batch-size: ${NOTIFY_WORKER_RETRY_BATCH_SIZE:50}
    lease-duration-ms: ${NOTIFY_WORKER_LEASE_DURATION_MS:60000}
    # Pod identifier — production: env HOSTNAME; default: hostname-pid
    owner: ${NOTIFY_WORKER_OWNER:}
    # PR4 iter-1 absorb — test isolation: scheduling-enabled=false → manual runCycle()
    scheduling-enabled: ${NOTIFY_WORKER_SCHEDULING_ENABLED:true}
  audit:
    retention-days: ${NOTIFY_AUDIT_RETENTION_DAYS:90}
  idempotency:
    window-hours: ${NOTIFY_IDEMPOTENCY_WINDOW_HOURS:24}
  dedupe:
    window-minutes: ${NOTIFY_DEDUPE_WINDOW_MINUTES:5}
  # PR2 PII redaction HMAC pepper — Faz 23.2 production: Vault/ESO injection
  redaction:
    pepper: ${NOTIFY_REDACTION_PEPPER:dev-only-pepper-not-for-production}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.serban.notify: ${LOGGING_LEVEL_COM_SERBAN_NOTIFY:INFO}
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%X{correlation_id:-NONE}] %-40.40logger{39} : %m%n"
