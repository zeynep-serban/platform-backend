name: Add labeled items to platform Roadmap

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

permissions: {}

jobs:
  add-to-board:
    if: github.event.label.name == 'project-roadmap'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        with:
          project-url: https://github.com/users/Halildeu/projects/2
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          labeled: project-roadmap
