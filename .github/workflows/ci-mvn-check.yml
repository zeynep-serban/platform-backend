name: CI - Maven Build Check

# Faz 19.2 — Batch 1 (auth + user + variant)
# Faz 19.3 — Batch 2 Zanzibar plane genişletildi (permission-service + common-auth)
# Faz 19.4+19.5 — Batch 3+4 full reactor (core + report + api-gateway + discovery-server)
# Faz endpoint-admin — endpoint-admin-service parent reactor'a eklendi
#   + schema-service (standalone, not in parent pom)

on:
  push:
    # `codex/be-001-...` is added explicitly so push-time runs against that
    # integration branch also exercise the new endpoint-admin-service-test
    # lane (the codex BE-001 work merges into this branch first; main is
    # a downstream cutover decision).
    branches:
      - main
      - codex/be-001-endpoint-admin-service-platform-backend
  pull_request:
    # Same explicit allow-list for PR-target branches: any PR whose base is
    # main OR the codex BE-001 integration branch triggers the full Maven
    # gate. Ad-hoc feature branches keep the previous default of not running
    # this expensive lane.
    branches:
      - main
      - codex/be-001-endpoint-admin-service-platform-backend
  workflow_dispatch:

jobs:
  full-reactor-build:
    name: Maven full reactor build (all 10 modules)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Display Maven version
        run: ./mvnw --version

      - name: Compile full reactor (10 modules)
        run: ./mvnw -q -DskipTests test-compile

      - name: Verify full reactor (10 modules, no tests)
        run: ./mvnw -q -DskipTests verify

  schema-service-build:
    name: schema-service standalone build (Faz 19.4+19.5)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # schema-service parent pom'unda değil; ayrı lifecycle
    # Ama common-auth (1.1.0) dependency'i var — önce common-auth local install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Install common-auth to local Maven repo (schema-service dependency)
        run: ./mvnw -q -DskipTests -pl common-auth -am install

      - name: Build schema-service (standalone)
        run: |
          test -f schema-service/pom.xml || (echo "schema-service/pom.xml missing!" && exit 1)
          cd schema-service
          ../mvnw -q -DskipTests test-compile
          ../mvnw -q -DskipTests verify

  endpoint-admin-service-test:
    name: endpoint-admin-service unit + slice test (BE-001 authz/test gate)
    runs-on: ubuntu-latest
    needs: [full-reactor-build]
    timeout-minutes: 15

    # The full-reactor-build job runs `verify -DskipTests` so endpoint-admin
    # JUnit + @WebMvcTest authz coverage never executed there. This dedicated
    # lane ensures every PR / main push runs the full endpoint-admin test
    # surface, catching:
    #   - missing @RequireModule annotations on admin controllers
    #     (EndpointAdminAuthorizationAnnotationTest, reflection-based)
    #   - JWT authority shape regressions on admin SecurityFilterChain
    #     (AdminEndpointAuthorizationSecurityTest, MockMvc + jwt())
    #   - service / repo regressions in the rest of the suite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Pre-install common-auth (parent reactor dependency, not in Maven Central)
        run: ./mvnw -q -pl common-auth install -DskipTests

      - name: Run endpoint-admin-service tests
        run: ./mvnw -pl endpoint-admin-service test

  permission-service-integration-test:
    name: permission-service Testcontainers integration test (Faz 21.3 PR-F C3c)
    runs-on: ubuntu-latest
    needs: [full-reactor-build]
    timeout-minutes: 15

    # Codex 019dcfb0 iter-1 BLOCKER #1: PR-F integration tests must run on
    # CI, not just locally. Linux runners ship with Docker on /var/run/docker.sock
    # so Testcontainers picks the daemon up without overrides. The
    # `integration-tests` Maven profile flips Surefire's group filter to
    # include only @Tag("integration") classes (DataAccessIntegrationTest
    # + DataAccessActivationContractTest, the latter via *ContractTest test
    # filter even though it carries no @Tag — keeps the activation contract
    # check on this slow lane too).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Pre-install common-auth (parent reactor dependency, not in Maven Central)
        run: ./mvnw -q -pl common-auth install -DskipTests

      - name: Run permission-service Testcontainers integration tests
        run: ./mvnw -q -pl permission-service test -Pintegration-tests -Dtest='DataAccessIntegrationTest,DataAccessActivationContractTest'

  openfga-dsl-check:
    name: OpenFGA DSL presence + line check (basic)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    # Faz 19.3 — fga CLI v0.6 'but not' syntax incompat; full DSL validate
    # 19.8+'da newer fga CLI ile yeniden eklenecek. Şimdilik basic presence check.
    # Authoritative validation: K8s OpenFGA StatefulSet runtime (Vault kv/platform/openfga).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check DSL file present + size
        run: |
          test -f openfga/model.fga || (echo "openfga/model.fga missing!" && exit 1)
          wc -l openfga/model.fga
          echo "--- first 20 lines ---"
          head -20 openfga/model.fga
          echo "--- last 10 lines ---"
          tail -10 openfga/model.fga

      - name: Check DSL schema marker
        run: |
          grep -q "^model" openfga/model.fga
          grep -q "^  schema" openfga/model.fga
          grep -cE "^type " openfga/model.fga
          echo "DSL structural check PASS"
