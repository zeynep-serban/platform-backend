name: CI - Image Build + GHCR Push

# Faz 19.8 dual-build — Codex AGREE 019dc0ef Option B
# Yeni image isimleri: ghcr.io/halildeu/platform-backend-<service>
# Gitops overlay'leri 19.9'da digest pin ile bu image'lara geçecek.
# Ssot CI paralel kalır (19.10'a kadar) — dual-build safety net.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service image to build, or all"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - auth-service
          - user-service
          - variant-service
          - core-data-service
          - report-service
          - endpoint-admin-service
          - schema-service
          - permission-service
          - api-gateway
          - discovery-server
          - notification-orchestrator

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: halildeu

jobs:
  build-and-push:
    name: Build + Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - variant-service
          - core-data-service
          - report-service
          - endpoint-admin-service
          - schema-service
          - permission-service
          - api-gateway
          - discovery-server
          - notification-orchestrator

    steps:
      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.service == 'all' || inputs.service == matrix.service }}
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.service == 'all' || inputs.service == matrix.service }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.service == 'all' || inputs.service == matrix.service }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive short SHA
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.service == 'all' || inputs.service == matrix.service }}
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build + Push image
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.service == 'all' || inputs.service == matrix.service }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-backend-${{ matrix.service }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-backend-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: false

      - name: Summary — digest (19.9 pin için kanıt)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.service == 'all' || inputs.service == matrix.service }}
        run: |
          echo "### ${{ matrix.service }} image push" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-backend-${{ matrix.service }}:sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pinnable**: \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-backend-${{ matrix.service }}@${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

      # iter-49 B.3 hardening: per-service digest artifact for dispatch
      # aggregation. Matrix output cross-job toplama karmaşası yerine
      # actions/upload-artifact ile her servis kendi digest'ini ayrı
      # artifact'e yazar; dispatch job download-artifact ile toplayıp
      # JSON map oluşturur ve client_payload[digests]'e gönderir.
      # gitops deploy-backend-testai.yml digest-pin mode ile @sha256:
      # direct pin yapar (D30 immutable cutover-ready).
      - name: Save digest as artifact (B.3 dispatch payload prep)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.service == 'all' || inputs.service == matrix.service }}
        run: |
          mkdir -p /tmp/digests
          DIGEST_RAW="${{ steps.build.outputs.digest }}"
          # docker/build-push-action returns "sha256:<hash>"; strip prefix
          # so the file content is bare hex hash; dispatch job re-prefixes.
          DIGEST_HEX="${DIGEST_RAW#sha256:}"
          if [ -z "${DIGEST_HEX}" ] || [ "${#DIGEST_HEX}" -ne 64 ]; then
            echo "::error::digest format invalid: ${DIGEST_RAW}"
            exit 1
          fi
          echo "${DIGEST_HEX}" > "/tmp/digests/${{ matrix.service }}"
      - name: Upload digest artifact
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.service == 'all' || inputs.service == matrix.service }}
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.service }}
          path: /tmp/digests/${{ matrix.service }}
          retention-days: 1

  # iter-49 backend deploy automation — Codex 019ddf43.
  # Matrix tüm service'ler SUCCESS olduktan sonra TEK dispatch event
  # gitops repo'ya gönderir.
  #
  # iter-49 B.3 hardening: dispatch payload artık per-service digest
  # JSON map içerir. gitops deploy workflow digest-pin mode'da bunu
  # tüketir (skopeo bypass + tag-based fallback yerine direct
  # @sha256:<digest> pin, D30 immutable cutover-ready).
  dispatch:
    name: Dispatch backend-testai-deploy to gitops
    needs: build-and-push
    # Codex 019e4c81 post-impl REVISE absorb: only dispatch on push to main
    # or workflow_dispatch with service=all. Targeted single-service rebuild
    # produces partial digest map; gitops digest-pin deploy workflow expects
    # full N-service map and would fail-by-missing-service. Build-only dry-run
    # remains supported (matrix step runs); deploy dispatch skipped.
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.service == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download all per-service digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
      - name: Build digest map JSON
        id: digest-map
        run: |
          set -euo pipefail
          MAP="{}"
          if [ -d /tmp/digests ]; then
            for f in /tmp/digests/*; do
              [ -f "$f" ] || continue
              svc=$(basename "$f")
              hex=$(cat "$f" | tr -d '[:space:]')
              if [ "${#hex}" -ne 64 ]; then
                echo "::error::digest hex length invalid for ${svc}: ${hex}"
                exit 1
              fi
              MAP=$(echo "$MAP" | jq --arg s "$svc" --arg d "sha256:$hex" '. + {($s): $d}')
            done
          fi
          # Compact one-line JSON for client_payload safe transport
          COMPACT=$(echo "$MAP" | jq -c .)
          echo "json=${COMPACT}" >> "$GITHUB_OUTPUT"
          echo "Digest map ($(echo "$MAP" | jq 'length') services):"
          echo "$MAP" | jq .
      - name: Dispatch event (with digest map payload)
        env:
          GH_TOKEN: ${{ secrets.GITOPS_DISPATCH_PAT }}
          DIGESTS_JSON: ${{ steps.digest-map.outputs.json }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::GITOPS_DISPATCH_PAT not set; skipping dispatch"
            exit 0
          fi
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          # client_payload.digests JSON map; deploy workflow tüketir
          # (yoksa tag-based fallback). Empty map ({}) gönderilirse
          # deploy workflow yine tag-based fallback'e düşer (jq object
          # check '{}' length 0 → digest mode active ama her servis
          # missing → fail; bu yüzden empty map'i null'a indir).
          gh api repos/Halildeu/platform-k8s-gitops/dispatches \
            -X POST \
            -f event_type=backend-testai-deploy \
            -F "client_payload[sha]=${{ github.sha }}" \
            -F "client_payload[short_sha]=${SHORT_SHA}" \
            -F "client_payload[ref]=${{ github.ref_name }}" \
            --raw-field "client_payload[digests]=${DIGESTS_JSON}"
          echo "Dispatched backend-testai-deploy to platform-k8s-gitops"
          echo "  - sha:       ${{ github.sha }}"
          echo "  - short_sha: ${SHORT_SHA}"
          echo "  - digests:   $(echo "${DIGESTS_JSON}" | jq 'length') service(s)"
