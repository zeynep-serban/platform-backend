spring.profiles.active=local
spring.main.banner-mode=off
spring.config.import=
spring.cloud.vault.enabled=false
spring.jpa.open-in-view=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.service-registry.auto-registration.enabled=false
management.endpoints.access.default=none
management.prometheus.metrics.export.enabled=false
spring.cloud.gateway.server.webflux.metrics.enabled=false
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.netflix.discovery=OFF
logging.level.org.springframework.cloud.netflix.eureka=OFF
logging.level.com.example.apigateway=ERROR

# Phase 2 PR-BE-7: tightened rate limit for fast deterministic tests.
gateway.auth-cookie.rate-limit.refresh.per-minute=2
gateway.auth-cookie.rate-limit.refresh.burst=2
gateway.auth-cookie.rate-limit.root.per-minute=4
gateway.auth-cookie.rate-limit.root.burst=4
