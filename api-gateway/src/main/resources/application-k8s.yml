# application-k8s.yml — api-gateway (platform-k8s-gitops uyumlu)
#
# D7: Eureka kaldırıldı, route URI'leri K8s svc DNS ile set edilir
# D18: management port 8081 ayrı port (actuator auth-free, probe için)
# D25: Dilim 1+2+3 path prefix routing (/auth, /users, /variants, /core, /reports, /schemas)

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true

  cloud:
    vault:
      enabled: false
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
    loadbalancer:
      cache:
        enabled: false

    # Gateway route tanımları — env override (PLACEHOLDER_NS overlay patch ile)
    gateway:
      discovery:
        locator:
          enabled: false        # ReactiveDiscoveryClient bean çakışmasını önler
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8088}
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8089}
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=1
        - id: variant-service
          uri: ${VARIANT_SERVICE_URL:http://variant-service:8091}
          predicates:
            - Path=/variants/**
          filters:
            - StripPrefix=1
        - id: core-data-service
          uri: ${CORE_DATA_URL:http://core-data-service:8092}
          predicates:
            - Path=/core/**
          filters:
            - StripPrefix=1
        - id: report-service
          uri: ${REPORT_URL:http://report-service:8095}
          predicates:
            - Path=/reports/**
          filters:
            - StripPrefix=1
        - id: schema-service
          uri: ${SCHEMA_URL:http://schema-service:8096}
          predicates:
            - Path=/schemas/**
          filters:
            - StripPrefix=1
        # Faz 23.6 hardening (2026-05-08): notification-orchestrator
        # `/api/v1/notify/**` requests were 404'ing at the gateway
        # because no route matched the prefix. Browser console showed
        # `/api/v1/notify/inbox/me` 404 + `/api/v1/notify/inbox/me/stream`
        # 401 (security filter intercepted the latter before the router
        # 404'd it). Backend controllers expect the full
        # `/api/v1/notify/...` path (see NotificationIntentController,
        # InboxController, PreferenceController, AdminDeliveryController,
        # DeliveryLogController), so this route MUST NOT use
        # `StripPrefix` — pass the path through verbatim. Service
        # contract: notification-orchestrator listens on port 8089
        # (HTTP server) with management on 8081 (actuator).
        - id: notification-orchestrator
          uri: ${NOTIFY_URL:http://notification-orchestrator:8089}
          predicates:
            - Path=/api/v1/notify/**
        # Faz 22.1.1 H2 endpoint-admin gateway routes (Codex 019e4c3f AGREE):
        # Path-segment rewrite so the gateway-public URL surface stays
        # `/api/v1/endpoint-{agent,admin,status}/**` while the downstream
        # service contract maps to its native `/api/v1/{agent,admin}/**`
        # path (matches endpoint-admin-service controllers). The `status`
        # route is read-only and does NOT rewrite (frontend hits
        # `/api/v1/endpoint-agents/...` directly). Service contract:
        # endpoint-admin-service listens on 8096 (HTTP) with mgmt 8081.
        #
        # Faz 22.3 (Codex 019e6dc9 P0-A absorb): the mTLS self-enroll
        # endpoint listens on the FULL `/api/v1/endpoint-agent/endpoint-
        # enrollments/auto` path on the backend — NOT under the legacy
        # `/api/v1/agent/...` segment. We need an exact-match route OUTSIDE
        # the H2 rewrite, ordered BEFORE the generic `endpoint-admin-
        # agent-route` so the specific predicate wins (Spring Cloud
        # Gateway evaluates routes in declaration order). This route does
        # NOT rewrite the path and forwards the gateway/ingress-supplied
        # `X-Client-Cert` and `X-Tenant-Id` headers verbatim. The k8s
        # ingress in front of this gateway MUST strip any client-supplied
        # `X-Client-Cert` / `X-Tenant-Id` before the request reaches the
        # gateway — see ADR-0029 §"Backend layer".
        - id: endpoint-admin-mtls-auto-enroll-route
          uri: ${ENDPOINT_ADMIN_SERVICE_URL:http://endpoint-admin-service:8096}
          predicates:
            - Path=/api/v1/endpoint-agent/endpoint-enrollments/auto
        - id: endpoint-admin-agent-route
          uri: ${ENDPOINT_ADMIN_SERVICE_URL:http://endpoint-admin-service:8096}
          predicates:
            - Path=/api/v1/endpoint-agent/**
          filters:
            - RewritePath=/api/v1/endpoint-agent/(?<segment>.*), /api/v1/agent/$\{segment}
        - id: endpoint-admin-admin-route
          uri: ${ENDPOINT_ADMIN_SERVICE_URL:http://endpoint-admin-service:8096}
          predicates:
            - Path=/api/v1/endpoint-admin/**
          filters:
            - RewritePath=/api/v1/endpoint-admin/(?<segment>.*), /api/v1/admin/$\{segment}
        - id: endpoint-admin-status-route
          uri: ${ENDPOINT_ADMIN_SERVICE_URL:http://endpoint-admin-service:8096}
          predicates:
            - Path=/api/v1/endpoint-agents/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/serban}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/serban/protocol/openid-connect/certs}

# Spring Cloud auto-config'ten Eureka ilişkili class'ları hariç tut — dependency
# kaldırıldı ama Spring Cloud Gateway native modüllerinden kalan bean reference
# fail olabilir. Bu eksikliği cover eden final safety net:
# (dep kaldırıldığı için bu exclude fiilen no-op; bırakıyoruz çünkü
#  main-stable rollout sürecinde her node aynı anda upgrade olmaz, karışıklık önler)

server:
  port: ${SERVER_PORT:8080}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus,gateway}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    org.springframework.cloud.gateway: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_GATEWAY:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSSXXX}","level":"%p","trace_id":"%X{traceId:-}","span_id":"%X{spanId:-}","thread":"%t","logger":"%logger{36}","message":"%m"}%n'
