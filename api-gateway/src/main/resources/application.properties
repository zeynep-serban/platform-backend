# Varsayılan olarak 'local' profilini aktif et.
spring.profiles.active=local

# Virtual Threads (Loom) — Java 21
spring.threads.virtual.enabled=true

# --- ORTAK AYARLAR ---
spring.application.name=api-gateway
server.port=8080

# Actuator & Health Check Ayarları
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.access=read-only
management.prometheus.metrics.export.enabled=true

# Eureka Client Ayarları (ortak olanlar)
eureka.instance.prefer-ip-address=true
eureka.client.healthcheck.enabled=true
eureka.instance.health-check-url-path=/actuator/health

# Spring Cloud Gateway Ayarları
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.routes[0].id=auth-service-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.server.webflux.routes[1].id=user-service-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://USER-SERVICE
# Kullanıcı servis rotası
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webflux.routes[2].id=variant-service-route
spring.cloud.gateway.server.webflux.routes[2].uri=lb://VARIANT-SERVICE
# Varyant servis rotası
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/variants/**

spring.cloud.gateway.server.webflux.routes[3].id=permission-service-route
spring.cloud.gateway.server.webflux.routes[3].uri=lb://PERMISSION-SERVICE
# Yetki servis rotası
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/permissions/**

# Access (roles/policies) rotası aynı servise yönlenir
spring.cloud.gateway.server.webflux.routes[4].id=permission-access-route
spring.cloud.gateway.server.webflux.routes[4].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/access/**

# Audit events base list — feature-flagged owner (2026-04-20 QLTY-PROACTIVE-06 Faz 1).
# AUDIT_BACKEND_URI env controls which service owns GET /api/audit/events:
#   - `lb://USER-SERVICE`        → legacy data source (user_audit_events table, no auth gate)
#   - `lb://PERMISSION-SERVICE`  → consolidation target (merged event store + AUDIT.viewer gate)
# Stage cutover = flip canonical env AUDIT_BACKEND_URI + recreate api-gateway container.
# Rollback = env one-liner, no code change.
# Note: /live and /export/** subsurfaces are ALWAYS routed to permission-service via routes[16,17]
# (order=-1) — this flag governs ONLY the base list endpoint.
spring.cloud.gateway.server.webflux.routes[5].id=permission-audit-route
spring.cloud.gateway.server.webflux.routes[5].uri=${AUDIT_BACKEND_URI:lb://USER-SERVICE}
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/audit/**

# ---------------------------------------------------------------------------
# Audit SSE live-stream + export surfaces — PERMISSION-SERVICE owns these
# (user-service has no /live, /export, /export-jobs mappings → 404 via route[5]).
# 2026-04-19 QLTY-PROACTIVE-03: fix for admin dashboard 404 on /api/audit/events/live.
# order=-1 ensures evaluation before the broader /api/audit/** catch-all.
# ---------------------------------------------------------------------------
spring.cloud.gateway.server.webflux.routes[16].id=permission-audit-live-route
spring.cloud.gateway.server.webflux.routes[16].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.server.webflux.routes[16].predicates[0]=Path=/api/audit/events/live
spring.cloud.gateway.server.webflux.routes[16].order=-1

spring.cloud.gateway.server.webflux.routes[17].id=permission-audit-export-route
spring.cloud.gateway.server.webflux.routes[17].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.server.webflux.routes[17].predicates[0]=Path=/api/audit/events/export,/api/audit/events/export-jobs/**
spring.cloud.gateway.server.webflux.routes[17].order=-1

# 2026-04-20 QLTY-PROACTIVE-06 Faz 2: shadow-compare diagnostic endpoint.
# Lives only on permission-service; gated on AUDIT.manager. Used to collect
# parity evidence between user-service and permission-service audit responses
# before the operator flips AUDIT_BACKEND_URI (Faz 1).
spring.cloud.gateway.server.webflux.routes[18].id=permission-audit-compare-route
spring.cloud.gateway.server.webflux.routes[18].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.server.webflux.routes[18].predicates[0]=Path=/api/audit/events/compare
spring.cloud.gateway.server.webflux.routes[18].order=-1

# --- v1 REST path'leri (legacy path'ler korunur) ---
spring.cloud.gateway.server.webflux.routes[6].id=auth-service-v1-route
spring.cloud.gateway.server.webflux.routes[6].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.server.webflux.routes[7].id=user-service-v1-route
spring.cloud.gateway.server.webflux.routes[7].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/v1/users/**,/api/v1/notification-preferences/**

spring.cloud.gateway.server.webflux.routes[8].id=variant-service-v1-route
spring.cloud.gateway.server.webflux.routes[8].uri=lb://VARIANT-SERVICE
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/v1/variants/**

spring.cloud.gateway.server.webflux.routes[12].id=variant-service-v1-theme-route
spring.cloud.gateway.server.webflux.routes[12].uri=lb://VARIANT-SERVICE
spring.cloud.gateway.server.webflux.routes[12].predicates[0]=Path=/api/v1/themes/**,/api/v1/me/theme/**,/api/v1/theme-registry/**

spring.cloud.gateway.server.webflux.routes[9].id=permission-service-v1-roles-route
spring.cloud.gateway.server.webflux.routes[9].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/v1/roles/**

spring.cloud.gateway.server.webflux.routes[10].id=permission-service-v1-permissions-route
spring.cloud.gateway.server.webflux.routes[10].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/api/v1/permissions/**

spring.cloud.gateway.server.webflux.routes[13].id=authz-proxy-route
spring.cloud.gateway.server.webflux.routes[13].uri=lb://PERMISSION-SERVICE
spring.cloud.gateway.server.webflux.routes[13].predicates[0]=Path=/api/v1/authz/**

# core-data-service v1 path
spring.cloud.gateway.server.webflux.routes[11].id=core-data-service-v1-route
spring.cloud.gateway.server.webflux.routes[11].uri=lb://CORE-DATA-SERVICE
spring.cloud.gateway.server.webflux.routes[11].predicates[0]=Path=/api/v1/companies/**

# Report service v1 path
spring.cloud.gateway.server.webflux.routes[14].id=report-service-v1-route
spring.cloud.gateway.server.webflux.routes[14].uri=lb://REPORT-SERVICE
spring.cloud.gateway.server.webflux.routes[14].predicates[0]=Path=/api/v1/reports/**

# Dashboard service v1 path (routed to report-service)
spring.cloud.gateway.server.webflux.routes[15].id=dashboard-service-v1-route
spring.cloud.gateway.server.webflux.routes[15].uri=lb://REPORT-SERVICE
spring.cloud.gateway.server.webflux.routes[15].predicates[0]=Path=/api/v1/dashboards/**

# Faz 23.5+ PR-Notify-1 (2026-05-07) — notification-orchestrator user-facing
# REST + SSE surface. Frontend (mfe-shell NotificationCenter +
# useInboxUnreadSse) calls
# {@code GET /api/v1/notify/inbox/me}, {@code GET /api/v1/notify/inbox/me/unread-count},
# {@code POST /api/v1/notify/inbox/{id}/{read,archive}},
# {@code POST /api/v1/notify/inbox/me/mark-all-read},
# {@code GET /api/v1/notify/inbox/me/stream?orgId=X&subscriberId=Y} (SSE),
# {@code GET/PUT /api/v1/notify/preferences/me}.
# Backend ownership: InboxController + InboxSseController +
# NotificationPreferencesController. The KVKK admin surface
# (AdminErasureController) lives at {@code /api/v1/admin/notify/**} and
# is a SEPARATE gitops route (kustomize/base/apps/api-gateway/configmap.yaml
# SPRING_CLOUD_GATEWAY_ROUTES_19_*); not introduced in local
# application.properties because admin operations are operator-only and
# never traverse the local-profile gateway.
#
# Live evidence (testai.acik.com 2026-05-07): cold reload produced 404 on
# /api/v1/notify/inbox/me — the local profile gateway routes table did not
# carry a /api/v1/notify/** entry. The gitops configmap had the equivalent
# entry under env-style keys (SPRING_CLOUD_GATEWAY_ROUTES_20_*); this brings
# the local/integration property file to parity. Index 19 here is the next
# free slot in this file and is intentionally not aligned with the gitops
# configmap index (gitops index 20 = Path=/api/v1/notify/**, gitops index 19
# = admin notify) — Spring binds list entries by sparse index so the
# numbering only needs to be unique within each source.
spring.cloud.gateway.server.webflux.routes[19].id=notification-orchestrator-v1-route
spring.cloud.gateway.server.webflux.routes[19].uri=lb://NOTIFICATION-ORCHESTRATOR
spring.cloud.gateway.server.webflux.routes[19].predicates[0]=Path=/api/v1/notify/**

# Global CORS Ayarları
# Env-driven allowlist (prod: https://ai.acik.com, local: http://localhost:3000,3004).
# Codex CNS thread 019d97c7 Tur 10 kök neden: browser Origin header varlığında
# gateway'in fixed localhost-only CORS allowlist'i 403 üretiyordu. Exact origin
# allowlist, `allow-credentials=true` ile wildcard güvensiz. Default lokal dev
# için korunur; staging/prod compose env üzerinden extend eder.
#
# Single source of truth (alias): ProdCorsConfig and globalcors config both
# read from gateway.cors.allowed-origins. Spring relaxed binding accepts
# GATEWAY_CORS_ALLOWED_ORIGINS env var automatically.
gateway.cors.allowed-origins=${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3004}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=${gateway.cors.allowed-origins}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=Authorization,Content-Type,Accept,Cache-Control,X-Trace-Id,X-Correlation-Id,traceparent,tracestate,X-Company-Id,X-Project-Id,X-Warehouse-Id,X-Internal-Api-Key
# PR F (Codex CNS thread 019d99ba Tur 12): Preflight OPTIONS 403 fix.
# local profile'da bu property vardı (application-local.properties:10), non-local'da
# eksikti → browser preflight `OPTIONS /api/v1/authz/me + Origin=ai.acik.com` → 403
# (SimpleUrlHandlerMapping CORS config'i tüketemiyordu). add-to-simple-url-handler-mapping=true
# Spring Cloud Gateway'in global CORS config'i simple handler'a eklemesini sağlar.
# P1.5 (Codex CNS thread 019d9b43): add-to-simple-url-handler-mapping alone did
# not fix preflight in prod — ProdCorsConfig @Order(HIGHEST_PRECEDENCE)
# CorsWebFilter bean is the authoritative prod CORS handler.
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true

# Logging Ayarları
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
# JWT doğrulama katmanında ayrıntılı log için
logging.level.org.springframework.security.oauth2.jwt=DEBUG
logging.level.org.springframework.security.oauth2.server.resource=DEBUG

# JWT doğrulama (env ile override edilir)
# Default: Keycloak serban realm
SECURITY_JWT_JWK_SET_URI=${SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}
SECURITY_JWT_ISSUER=${SECURITY_JWT_ISSUER:http://localhost:8081/realms/serban}
# Çoklu issuer desteği için opsiyonel liste (virgül ile ayır)
# Örn: SECURITY_JWT_JWK_SET_URIS=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
#      SECURITY_JWT_ISSUERS=http://keycloak:8080/realms/serban
# SECURITY_JWT_AUDIENCE opsiyonel; kullanıcı token’larında route bazlı kontrol tercih edilebilir
# Varsayılan aud listesine variant-service eklendi; gerekirse env ile override edilir.
SECURITY_JWT_AUDIENCE=${SECURITY_JWT_AUDIENCE:api-gateway,frontend,account,serban-web}

# Spring Cloud 2025.0.1 LoadBalancer — retry ve health check ayarları
spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.retry.max-retries-on-same-service-instance=1
spring.cloud.loadbalancer.retry.max-retries-on-next-service-instance=1
spring.cloud.loadbalancer.health-check.initial-delay=5s
spring.cloud.loadbalancer.health-check.interval=10s

# Gateway metrics (routeId etiketi için)
spring.cloud.gateway.server.webflux.metrics.enabled=true

# Phase 2 PR-BE-7 (Codex thread 019e0518 iter-2): rate limit for
# POST /api/auth/cookie + /api/auth/cookie/refresh (refresh storm
# protection). Soft throttle / dampener — HPA replicas multiply
# the effective threshold cluster-wide. Trusted-proxy XFF assumed.
gateway.auth-cookie.rate-limit.refresh.per-minute=10
gateway.auth-cookie.rate-limit.refresh.burst=20
gateway.auth-cookie.rate-limit.root.per-minute=30
gateway.auth-cookie.rate-limit.root.burst=60
gateway.auth-cookie.rate-limit.cache.max-size=10000
gateway.auth-cookie.rate-limit.cache.expire-after-access=PT15M
