server:
  port: ${SERVER_PORT:8096}
  tomcat:
    threads:
      virtual:
        enabled: true

spring:
  application:
    name: schema-service

  datasource:
    url: jdbc:sqlserver://${SCHEMA_MSSQL_HOST:localhost}:${SCHEMA_MSSQL_PORT:1433};databaseName=${SCHEMA_MSSQL_DB:workcube_mikrolink};encrypt=true;trustServerCertificate=true;applicationIntent=ReadOnly
    username: ${SCHEMA_MSSQL_USERNAME:sa}
    password: ${SCHEMA_MSSQL_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      pool-name: schema-mssql-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 15000
      max-lifetime: 600000
      read-only: true
      connection-init-sql: "SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;"
      initialization-fail-timeout: -1

  cache:
    type: simple

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SECURITY_JWT_JWK_SET_URI:http://localhost:8080/realms/serban/protocol/openid-connect/certs}
          issuer-uri: ${SECURITY_JWT_ISSUER:http://localhost:8080/realms/serban}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    db:
      enabled: false

schema:
  default-schema: ${SCHEMA_DEFAULT_SCHEMA:workcube_mikrolink}
  cache-ttl-minutes: ${SCHEMA_CACHE_TTL:60}
  max-tables: ${SCHEMA_MAX_TABLES:5000}
  discovery:
    enable-view-parsing: ${SCHEMA_ENABLE_VIEW_PARSE:true}
    enable-sp-parsing: ${SCHEMA_ENABLE_SP_PARSE:false}
    # Phase 1 portability (Codex 019e2d14 §8): schema discovery LIKE
    # patterns. Default Workcube-uyumlu. Multi-tenant veya yeni ERP
    # ekleyince listeye eklenir (örn. "eta_%,logo_%,workcube_mikrolink%,dbo").
    # '%' içeren değer LIKE pattern, içermeyen exact match.
    patterns: ${SCHEMA_DISCOVERY_PATTERNS:workcube_mikrolink%,dbo}
  yearly:
    # Phase 1 portability (Codex 019e2d14 §8 — quick win 2/5): yearly
    # partition schema discovery (workcube_mikrolink_<year>_<companyId>).
    # like-pattern → SQL LIKE ön-filtre. regex → Java normalizasyon;
    # SÖZLEŞME: en az 2 capture group (group(1) numeric year,
    # group(2) companyId). regex boş bırakılırsa kod Workcube
    # default'unu kullanır: ^workcube_mikrolink_(\d{4})_(\d+)$.
    # Spring placeholder default'u regex {n} quantifier ile çakıştığı
    # için varsayılan YAML'da değil kodda (DEFAULT_REGEX). Geçersiz
    # regex (syntax veya <2 group) → Workcube default'a düşer, startup
    # fail etmez. Yeni ERP eklenince override edilir.
    like-pattern: ${SCHEMA_YEARLY_LIKE_PATTERN:workcube_mikrolink_%_%}
    regex: ${SCHEMA_YEARLY_REGEX:}
  fk-heuristics:
    # Phase 1 portability (Codex 019e2d7d AGREE — quick win 3+4/5): FK
    # keşif sözlükleri JSON kaynağından. alias-path → alias_pattern
    # heuristic (kolon→tablo, confidence 0.90). common-fk-path →
    # common_fk heuristic (confidence 0.92). Default classpath kaynağı
    # Workcube-uyumlu (45 alias / 25 common FK). file: ile dış JSON
    # override edilir; dış dosya bozuk/eksik ise classpath default'a
    # düşülür (WARN). classpath default'un kendisi bozuksa startup fail
    # (packaging bug). Geçerli boş JSON {} → o heuristic kapatılır.
    alias-path: ${SCHEMA_FK_ALIAS_PATH:classpath:fk-heuristics/aliases-workcube.json}
    common-fk-path: ${SCHEMA_FK_COMMON_PATH:classpath:fk-heuristics/common-fk-workcube.json}
  ai:
    enabled: ${SCHEMA_AI_ENABLED:false}
    api-key: ${SCHEMA_AI_API_KEY:}
    api-url: ${SCHEMA_AI_API_URL:https://api.anthropic.com/v1/messages}
    model: ${SCHEMA_AI_MODEL:claude-sonnet-4-20250514}
